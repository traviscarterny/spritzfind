<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--surface:#fff;--border:#e8e2d9;--accent:#5b9bd5;--accent-gold:#b8860b;--accent2:#2d6a4f;--text:#1a1a1a;--muted:#8a8078;--card:#fff;--green:#2d6a4f}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;font-weight:400}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.9}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

.nav{border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);height:64px}
.nav-left{display:flex;align-items:center}
.nav-logo{font-family:'GFS Didot',serif;font-size:1.6rem;font-weight:400;letter-spacing:3px;padding-right:32px;border-right:1px solid var(--border);display:flex;align-items:center;cursor:pointer;text-decoration:none}
.nav-logo .spritz{color:var(--text)}.nav-logo .find{color:var(--accent)}
.nav-tabs{display:flex;align-items:stretch}
.nav-tab{display:flex;align-items:center;gap:7px;padding:0 22px;font-size:.7rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:all .15s;border-right:1px solid var(--border);border-bottom:2px solid transparent;background:transparent;border-top:none;border-left:none;font-family:'Outfit',sans-serif;text-decoration:none}
.nav-tab:hover{color:var(--text);background:rgba(91,155,213,0.04);text-decoration:none}
.hamburger{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text);padding:8px}
.mobile-menu{display:none}

.breadcrumb{padding:16px 40px;font-size:.7rem;color:var(--muted)}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .15s}
.breadcrumb a:hover{color:var(--text)}
.breadcrumb .sep{margin:0 8px}

.detail-wrap{max-width:1100px;margin:0 auto;padding:0 40px 60px;animation:fadeIn .3s ease}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:40px}
.detail-image-wrap{background:linear-gradient(135deg,#f7f9fc,#e8f1fa);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;min-height:360px;position:relative;overflow:hidden}
.detail-image{max-width:100%;max-height:400px;object-fit:contain;padding:30px}
.detail-image-placeholder{font-family:'GFS Didot',serif;font-size:5rem;color:#d0d8e0}
.detail-source-tag{position:absolute;bottom:10px;right:10px;font-size:.55rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;background:rgba(255,255,255,.9);border:1px solid var(--border);color:var(--muted);border-radius:3px}

.detail-info{display:flex;flex-direction:column;gap:14px}
.detail-brand{font-size:.65rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent-gold)}
.detail-name{font-family:'GFS Didot',serif;font-size:2.2rem;letter-spacing:1px;line-height:1.1}
.detail-notes{font-size:.8rem;color:var(--muted);line-height:1.6}
.detail-size{font-size:.7rem;color:var(--muted);letter-spacing:.5px}

.detail-meta{display:flex;flex-direction:column;gap:6px;margin-top:4px}

.pop-section{margin-top:4px}

.pop-label{font-size:.6rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:5px;display:flex;justify-content:space-between}

.prices-section{margin-top:0}

.prices-table th{background:#f8f9fb;padding:12px 20px;font-size:.6rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)}

.back-link{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-bottom:20px;transition:color .15s}
.back-link:hover{color:var(--text);text-decoration:none}

.related-section{margin-top:48px;border-top:1px solid var(--border);padding-top:32px}

.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.related-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;transition:all .2s;text-decoration:none;color:var(--text);display:block}
.related-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.06);border-color:var(--accent);transform:translateY(-2px);text-decoration:none}
.related-card-brand{font-size:.55rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent-gold);margin-bottom:4px}
.related-card-name{font-family:'GFS Didot',serif;font-size:1.1rem;line-height:1.2;margin-bottom:8px}
.related-card-price{font-size:.8rem;color:var(--green);font-weight:600}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 40px;gap:16px}
.loading-text{font-size:.75rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);animation:shimmer 1.5s infinite}
.loading-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite}

.not-found{text-align:center;padding:120px 40px}
.not-found h2{font-family:'GFS Didot',serif;font-size:2rem;letter-spacing:1px;margin-bottom:12px}
.not-found p{color:var(--muted);font-size:.82rem;margin-bottom:24px}
.not-found a{color:var(--accent);font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}

.site-footer{border-top:1px solid var(--border);padding:24px 40px;display:flex;align-items:center;justify-content:space-between;font-size:.65rem;color:var(--muted);max-width:1200px;margin:40px auto 0}
.footer-logo{font-family:'GFS Didot',serif;font-size:1.2rem;font-weight:400;letter-spacing:3px}
.footer-logo .spritz{color:var(--text)}.footer-logo .find{color:var(--accent)}
.footer-links{display:flex;gap:20px}
.footer-links a{color:var(--muted);text-decoration:none;font-weight:500;letter-spacing:1px;text-transform:uppercase;font-size:.6rem}
.footer-links a:hover{color:var(--accent)}

@media(max-width:768px){
  .nav{padding:0 16px}.nav-tabs{display:none}.hamburger{display:block}
  .mobile-menu{display:flex;flex-direction:column;position:absolute;top:64px;left:0;right:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:49;box-shadow:0 8px 30px rgba(0,0,0,.08)}
  .mobile-menu-item{padding:14px 24px;font-size:.75rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border)}
  .mobile-menu-item:hover{color:var(--accent)}
  .breadcrumb{padding:12px 16px}
  .detail-wrap{padding:0 16px 40px}
  .detail-grid{grid-template-columns:1fr;gap:24px}
  .detail-name{font-size:1.7rem}
  .detail-image-wrap{min-height:240px}
  .related-grid{grid-template-columns:1fr 1fr}
  .site-footer{flex-direction:column;gap:12px;text-align:center}
}
</style>
</head>

<script>
// Get fragrance slug from URL
const pathParts = window.location.pathname.split("/").filter(Boolean);
const fragSlug = pathParts.length >= 2 ? decodeURIComponent(pathParts.slice(1).join("/")) : null;

function esc(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function slugToQuery(slug){if(!slug)return"";return slug.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase())}
function nameToSlug(name){if(!name)return"";return name.toLowerCase().replace(/['']/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")}

const AFFILIATE={
  amazon:{tag:"spritzfind-20",param:"tag"},
  sephora:{tag:"YOUR_SEPHORA_CODE",param:"om_mmc"},
  ulta:{tag:"YOUR_ULTA_CODE",param:"AID"},
  fragrancex:{tag:"YOUR_FX_CODE",param:"ref"},
  fragrancenet:{tag:"YOUR_FN_CODE",param:"ref"},
  nordstrom:{tag:"YOUR_NORD_CODE",param:"utm_source"},
  macys:{tag:"YOUR_MACYS_CODE",param:"utm_source"},
};
function affLink(url,sourceId){
  if(!url)return"#";const aff=AFFILIATE[sourceId];
  if(!aff||aff.tag.startsWith("YOUR_"))return url;
  try{const u=new URL(url);u.searchParams.set(aff.param,aff.tag);return u.toString()}catch(e){return url}
}

function updateMeta(frag){
  const title=frag.name+" — Price Comparison | SpritzFind";
  const desc="Compare "+frag.name+" prices across Sephora, Ulta, Amazon, FragranceX and more. "+(frag.retail?"Retail: "+frag.retail+". ":"")+"Find the lowest price.";
  const url="https://www.spritzfind.com/fragrance/"+nameToSlug(frag.name);
  document.title=title;
  document.querySelector('meta[name="description"]').content=desc;
  const cl=document.getElementById("canonical-link");if(cl)cl.href=url;
  const ogt=document.getElementById("og-title");if(ogt)ogt.content=title;
  const ogd=document.getElementById("og-desc");if(ogd)ogd.content=desc;
  const ogu=document.getElementById("og-url");if(ogu)ogu.content=url;
  const twt=document.getElementById("tw-title");if(twt)twt.content=title;
  const twd=document.getElementById("tw-desc");if(twd)twd.content=desc;
  const ldEl=document.getElementById("ld-json");
  if(ldEl){
    const ld=[{
      "@context":"https://schema.org","@type":"Product",
      "name":frag.name,"description":desc,"url":url,
      "brand":{"@type":"Brand","name":frag.brand},
      "image":frag.image||"https://www.spritzfind.com/og-image.png"
    },{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[
      {"@type":"ListItem","position":1,"name":"Home","item":"https://www.spritzfind.com"},
      {"@type":"ListItem","position":2,"name":frag.brand||"Fragrances","item":"https://www.spritzfind.com/brand/"+nameToSlug(frag.brand||"")},
      {"@type":"ListItem","position":3,"name":frag.name,"item":url}
    ]}];
    if(frag.prices&&frag.prices.length>0){
      const nums=frag.prices.filter(p=>p.price&&p.price.startsWith("$")).map(p=>parseFloat(p.price.replace("$","")));
      if(nums.length>0){ld[0].offers={"@type":"AggregateOffer","priceCurrency":"USD","lowPrice":Math.min(...nums),"highPrice":Math.max(...nums),"offerCount":frag.prices.length}}
    }
    ldEl.textContent=JSON.stringify(ld);
  }
}

function renderNav(){
  const tabs=[{label:"Find Deals",href:"/"},{label:"New Releases",href:"/releases"},{label:"Deals",href:"/deals"},{label:"Blog",href:"/blog"}];
  return `<nav class="nav"><div class="nav-left">
    <a class="nav-logo" href="/" style="text-decoration:none"><span class="spritz">Spritz</span><span class="find">Find</span></a>
    <div class="nav-tabs">${tabs.map(t=>`<a class="nav-tab" href="${t.href}" style="text-decoration:none">${t.label}</a>`).join("")}</div>
    <button class="hamburger" data-action="hamburger">${mobileMenuOpen?"✕":"☰"}</button>
  </div>${mobileMenuOpen?`<div class="mobile-menu">${tabs.map(t=>`<a class="mobile-menu-item" href="${t.href}">${t.label}</a>`).join("")}</div>`:""}</nav>`;
}

function renderBreadcrumb(frag){
  const name=frag?esc(frag.name):"Loading...";
  const brand=frag?esc(frag.brand):"";
  return `<div class="breadcrumb"><a href="/">Home</a><span class="sep">›</span>${brand?`<a href="/brand/${nameToSlug(frag.brand)}">${brand}</a><span class="sep">›</span>`:""}${name}</div>`;
}

function renderDetail(frag){
  const BADGE_MAP={trending:"badge-trending",deal:"badge-deal",luxury:"badge-luxury",new:"badge-new"};
  const BADGE_LABELS={trending:"Trending",deal:"Great Deal",luxury:"Luxury",new:"New Release"};
  const imgHtml=frag.image?`<img class="detail-image" src="${esc(frag.image)}" alt="${esc(frag.name)}" onerror="this.parentNode.innerHTML='<div class=detail-image-placeholder>${esc(frag.brand?frag.brand[0]:"?")}</div>'">`:`<div class="detail-image-placeholder">${esc(frag.brand?frag.brand[0]:"?")}</div>`;
  const priceRows=(frag.prices||[]).sort((a,b)=>{const pa=parseFloat(a.price.replace(/[^0-9.]/g,""));const pb=parseFloat(b.price.replace(/[^0-9.]/g,""));return(isNaN(pa)?999:pa)-(isNaN(pb)?999:pb)}).map((p,i)=>{
    const isCheck=p.price==="Check Price";
    return `<tr><td class="store-name">${esc(p.store)}</td><td class="store-price${isCheck?" check":""}"${i===0&&!isCheck?' style="font-weight:800"':""}>${esc(p.price)}</td><td><a class="buy-btn" href="${esc(affLink(p.url,p.storeId))}" target="_blank" rel="noopener noreferrer nofollow">Buy</a></td></tr>`;
  }).join("");

  let html=`<div class="detail-wrap"><a class="back-link" href="/">← Back to Search</a><div class="detail-grid">`;
  html+=`<div class="detail-image-wrap">${imgHtml}${frag.source?`<div class="detail-source-tag">${esc(frag.source)}</div>`:""}</div>`;
  html+=`<div class="detail-info">`;
  if(frag.badge)html+=`<div class="badge ${BADGE_MAP[frag.badge]||"badge-new"}">${BADGE_LABELS[frag.badge]||esc(frag.badge)}</div>`;
  html+=`<div class="detail-brand">${esc(frag.brand)}</div><div class="detail-name">${esc(frag.name)}</div>`;
  if(frag.notes)html+=`<div class="detail-notes">${esc(frag.notes)}</div>`;
  if(frag.size)html+=`<div class="detail-size">${esc(frag.size)}</div>`;
  html+=`<div class="detail-meta"><div class="detail-meta-row"><span class="detail-meta-label">Retail</span><span class="detail-meta-value price">${esc(frag.retail||"—")}</span></div></div>`;
  if(frag.popularity){html+=`<div class="pop-section"><div class="pop-bar"><div class="pop-fill" style="width:${frag.popularity}%"></div></div><div class="pop-label"><span>Popularity</span><span>${frag.popularity}/100</span></div></div>`}
  html+=`</div></div>`;
  if(frag.prices&&frag.prices.length>0){html+=`<div class="prices-section"><div class="prices-heading">Compare Prices</div><table class="prices-table"><thead><tr><th>Store</th><th>Price</th><th></th></tr></thead><tbody>${priceRows}</tbody></table></div>`}
  if(related.length>0){html+=`<div class="related-section"><div class="related-heading">Similar Fragrances</div><div class="related-grid">${related.map(r=>`<a class="related-card" href="/fragrance/${esc(nameToSlug(r.name))}"><div class="related-card-brand">${esc(r.brand)}</div><div class="related-card-name">${esc(r.name)}</div><div class="related-card-price">${esc(r.retail||"—")}</div></a>`).join("")}</div></div>`}
  html+=`</div>`;
  return html;
}

function renderFooter(){
  return `<footer class="site-footer"><div class="footer-logo"><span class="spritz">Spritz</span><span class="find">Find</span></div><div class="footer-links"><a href="/">Find Deals</a><a href="/releases">Releases</a><a href="/deals">Deals</a><a href="/blog">Blog</a></div><div>Prices subject to change. Links may be affiliate links.</div></footer>`;
}

function render(){
  const root=document.getElementById("root");
  let content=renderNav();
  if(loading){content+=renderBreadcrumb(null)+`<div class="loading-wrap"><div class="loading-dot"></div><div class="loading-text">Finding best prices...</div></div>`}
  else if(error||!fragrance){content+=renderBreadcrumb(null)+`<div class="not-found"><h2>Fragrance Not Found</h2><p>We couldn't find pricing data for this fragrance.</p><a href="/">← Back to Search</a></div>`}
  else{content+=renderBreadcrumb(fragrance)+renderDetail(fragrance)}
  content+=renderFooter();
  root.innerHTML=content;
  const hb=document.querySelector('[data-action="hamburger"]');
  if(hb)hb.addEventListener("click",()=>{mobileMenuOpen=!mobileMenuOpen;render()});
}

const API_URL = "/.netlify/functions/fragella";

// Load fragrance from Fragella API
async function loadFragrance(){
  if(!fragSlug){loading=false;error=true;render();return}
  const query=slugToQuery(fragSlug);
  console.log("[SPRITZFIND] Loading fragrance:",fragSlug,"→ query:",query);

  try {
    // Search for the fragrance
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"search",query:query,limit:10}),
    });
    const json=await res.json();

    if(json.error||!json.data||json.data.length===0){
      // Fallback to sample data
      const target=fragSlug.toLowerCase();
      let best=null;let bestScore=-1;
      SAMPLE_FRAGRANCES.forEach(f=>{
        const fSlug=nameToSlug(f.name);
        if(fSlug===target){best=f;bestScore=1000;return}
        const tw=target.split("-");const fw=fSlug.split("-");
        let mc=0;tw.forEach(w=>{if(fw.includes(w))mc++});
        const score=mc/Math.max(tw.length,1);
        if(score>bestScore){bestScore=score;best=f}
      });
      if(best&&bestScore>=0.3){fragrance=best;related=SAMPLE_FRAGRANCES.filter(f=>f!==best).slice(0,4);updateMeta(fragrance)}
      else{error=true}
      loading=false;render();return;
    }

    // Find best match from API results
    const target=fragSlug.toLowerCase();
    let best=null;let bestScore=-1;
    json.data.forEach(d=>{
      const dSlug=nameToSlug(d.name);
      if(dSlug===target){best=d;bestScore=1000;return}
      const tw=target.split("-");const dw=dSlug.split("-");
      let mc=0;tw.forEach(w=>{if(dw.includes(w))mc++});
      const score=mc/Math.max(tw.length,1);
      if(score>bestScore){bestScore=score;best=d}
    });

    if(best&&bestScore>=0.3){
      fragrance=best;
      related=json.data.filter(d=>d!==best).slice(0,4);
      updateMeta(fragrance);

      // Also fetch similar fragrances
      try{
        const simRes=await fetch(API_URL,{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({action:"similar",name:best.name,limit:4}),
        });
        const simJson=await simRes.json();
        if(simJson.data&&simJson.data.length>0){related=simJson.data.slice(0,4)}
      }catch(e){console.log("[SPRITZFIND] Similar fetch failed, using search results")}
    }else{error=true}

    loading=false;render();
  }catch(err){
    console.error("[SPRITZFIND] Load error:",err);
    loading=false;error=true;render();
  }
}

render();
loadFragrance();
</script>
