<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {

      --surface: #ffffff;

    /* Subtle texture */

      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }

    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-6px); } }
    @keyframes typingBounce { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-5px); opacity: 1; } }

    .page { animation: fadeIn 0.2s ease; }

    /* ===== NAV ===== */

// ===== HELPERS =====
function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtMsg(t) { return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br/>'); }
const BADGE_MAP = {trending:"badge-trending",deal:"badge-deal",new:"badge-new",luxury:"badge-luxury"};

let showAlertModal = false;

// Find state

let dropsLoading = false;

let searchQuery = "";

// --- Fragrance Image ---
function renderDropImage(drop) {
  const src = (drop.image && drop.image !== "null") ? drop.image : null;
  const alt = esc((drop.brand ? drop.brand + " " : "") + drop.name);
  return `<div class="card-img-wrap">
    ${src ? `<img class="card-img" src="${esc(src)}" alt="${alt}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'card-img-placeholder\\'>${esc((drop.brand||"?")[0])}</div>'"/>` : `<div class="card-img-placeholder">${esc((drop.brand||"?")[0])}</div>`}
    ${drop.source ? `<div class="card-source-tag">${esc(drop.source)}</div>` : ""}
  </div>`;
}

// --- Price Compare ---
function renderPriceCompare(prices, drop, cardIdx) {
  if (!prices || prices.length === 0) return "";
  const sorted = [...prices].sort((a,b) => {
    const pa = parseFloat(a.price.replace(/[^0-9.]/g,''));
    const pb = parseFloat(b.price.replace(/[^0-9.]/g,''));
    if (isNaN(pa)) return 1;
    if (isNaN(pb)) return -1;
    return pa - pb;
  });
  const SHOW_INITIAL = 3;
  const hasMore = sorted.length > SHOW_INITIAL;
  const uid = `prices-${cardIdx}`;
  return `<div class="price-compare">
    <div class="price-compare-label">${sorted.length} ${sorted.length === 1 ? "Store" : "Stores"}</div>
    <div class="price-compare-rows">
      ${sorted.slice(0, SHOW_INITIAL).map((p,i) => `<div class="price-row">
        <span class="price-row-store">${esc(p.store)}</span>
        <span class="price-row-amount"${i===0?' style="color:var(--green);font-weight:800"':''}>${esc(p.price)}</span>
        <a href="${esc(affLink(p.url,p.storeId))}" target="_blank" rel="noopener noreferrer"
          class="price-row-btn"
          onclick="event.stopPropagation();trackClick(${JSON.stringify({name:drop.name})},'${esc(p.storeId)}')">Buy</a>
      </div>`).join("")}
      ${hasMore ? `<div id="${uid}" style="display:none">
        ${sorted.slice(SHOW_INITIAL).map((p,i) => `<div class="price-row">
          <span class="price-row-store">${esc(p.store)}</span>
          <span class="price-row-amount">${esc(p.price)}</span>
          <a href="${esc(affLink(p.url,p.storeId))}" target="_blank" rel="noopener noreferrer"
            class="price-row-btn"
            onclick="event.stopPropagation();trackClick(${JSON.stringify({name:drop.name})},'${esc(p.storeId)}')">Buy</a>
        </div>`).join("")}
      </div>
      <button class="price-toggle" data-target="${uid}" onclick="event.stopPropagation();var el=document.getElementById('${uid}');if(el.style.display==='none'){el.style.display='block';this.textContent='Show less';}else{el.style.display='none';this.textContent='+ ${sorted.length - SHOW_INITIAL} more stores';}">+ ${sorted.length - SHOW_INITIAL} more stores</button>` : ""}
    </div>
  </div>`;
}

// --- Drop Card ---
function renderDropCard(drop, i) {
  return `<div class="card">
    ${renderDropImage(drop)}
    <div class="card-body">
      ${drop.badge ? `<div class="badge ${BADGE_MAP[drop.badge]||"badge-new"}">${BADGE_LABELS[drop.badge]||esc(drop.badge)}</div>` : ""}
      <div class="card-brand">${esc(drop.brand)}</div>
      <div class="card-name">${esc(drop.name)}</div>
      ${drop.notes ? `<div class="card-notes">${esc(drop.notes)}</div>` : ""}
      <div class="card-meta">
        ${drop.size || drop.bottleSize ? `<div class="meta-row"><span class="meta-label">${drop.bottleSize ? "Size" : "Type"}</span><span class="meta-value">${drop.bottleSize ? esc(drop.bottleSize) + (drop.size ? ` · ${esc(drop.size)}` : "") : esc(drop.size)}</span></div>` : ""}
        <div class="meta-row"><span class="meta-label">Retail</span><span class="price">${esc(drop.retail||"—")}</span></div>
      </div>
      ${drop.popularity ? `<div class="pop-bar"><div class="pop-fill" style="width:${drop.popularity}%"></div></div><div class="pop-label"><span>Popularity</span><span>${drop.popularity}/100</span></div>` : ""}
      ${renderPriceCompare(drop.prices, drop, i)}

}

// --- Find Page ---
function renderFindPage() {
  window._BRAND_FILTERS = BRAND_FILTERS;

      ${[1,2,3,4,5,6].map(i => `<div class="loading-card"><div class="loading-img"></div><div class="loading-body"><div class="skeleton" style="width:60px;height:10px"></div><div class="skeleton" style="width:70%;height:22px;margin-top:8px"></div><div class="skeleton" style="width:100%;height:8px;margin-top:12px"></div></div></div>`).join("")}

      <div class="search-bar">
        <input id="search-input" value="${esc(searchQuery)}" placeholder="Search by brand, fragrance name, or notes..."/>
      </div>
      <button class="search-go-btn" data-action="search" ${dropsLoading?"disabled":""}>${dropsLoading?"Searching...":"SEARCH"}</button>
    </div>
    <div style="text-align:center;margin-top:16px;margin-bottom:8px;font-size:0.65rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent)">Browse by Brand & Scent</div>
    <div class="filters">
      ${BRAND_FILTERS.map((cat,idx) =>
        cat.tier
        ? `<div style="width:100%;margin:10px 0 6px;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.65rem;font-weight:600;letter-spacing:2px;color:var(--accent-gold);text-align:left">${esc(cat.label)}</div>`
        : `<button class="filter-btn ${activeCategory===cat.label?"active":""}" data-action="category" data-idx="${idx}">${esc(cat.label)}</button>`

    <div class="status-bar">
      <div class="pulse-dot"></div>
      ${dropsLoading ? "Searching retailers..." : `${filtered.length} fragrances found`}

// --- Chat Widget ---
function renderChat() {

          <div>

      ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>ASK NICHE</span>`

// ===== EVENT HANDLING =====
function attachEvents() {
  const si = document.getElementById("search-input");
  if (si) {
    si.addEventListener("keydown", e => {
      if (e.key === "Enter") { searchQuery = si.value; doSearch(searchQuery); }
    });
    si.value = searchQuery;
  }

  const ae = document.getElementById("alert-email-input");
  if (ae) ae.addEventListener("input", e => { alertEmail = e.target.value; });

  const ci = document.getElementById("chat-input");
  if (ci) {
    ci.addEventListener("input", e => { chatInput = e.target.value; });
    ci.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSendChat(); }
    });
    if (chatOpen) setTimeout(() => ci.focus(), 50);
  }

  const cb = document.getElementById("chat-bottom");
  if (cb) cb.scrollIntoView({behavior:"smooth"});
}

// ===== GLOBAL CLICK HANDLER =====
document.addEventListener("click", function(e) {
  const link = e.target.closest("a[href]");
  if (link && link.href && !link.dataset.action) return;
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === "home") { activePage = "find"; mobileMenuOpen = false; render(); }
  else if (action === "nav") { activePage = btn.dataset.page; render(); }
  else if (action === "nav-mobile") { activePage = btn.dataset.page; mobileMenuOpen = false; render(); }
  else if (action === "hamburger") { mobileMenuOpen = !mobileMenuOpen; render(); }
  else if (action === "alert-open") { showAlertModal = true; alertDone = false; alertEmail = ""; render(); }
  else if (action === "alert-close" || action === "alert-overlay") {
    if (action === "alert-overlay" && e.target !== btn) return;
    showAlertModal = false; render();
  }
  else if (action === "alert-submit") {
    if (!alertEmail.includes("@")) return;
    console.log("[SPRITZFIND] subscriber:", alertEmail);
    alertDone = true; render();
  }
  else if (action === "search") {
    const si = document.getElementById("search-input");
    if (si) searchQuery = si.value;
    doSearch(searchQuery);
  }
  else if (action === "category") {
    const cats = window._BRAND_FILTERS;
    const cat = cats[parseInt(btn.dataset.idx)];
    if (!cat) return;
    activeCategory = cat.label;
    if (cat.query === "") {
      searchQuery = "";
      doSearch("");
    } else {
      searchQuery = cat.query;
      doSearch(cat.query);
    }
  }
  else if (action === "load-more") { /* doLoadMore() placeholder */ }
  else if (action === "chat-toggle") { chatOpen = !chatOpen; render(); }
  else if (action === "chat-close") { chatOpen = false; render(); }
  else if (action === "chat-clear") {
    chatMsgs = [{role:"assistant",content:"Fresh start. What fragrance can I help with?"}];
    chatShowSug = true; render();
  }
  else if (action === "chat-send") { doSendChat(); }
  else if (action === "chat-suggest") { chatInput = btn.dataset.q; doSendChat(btn.dataset.q); }
});

// ===== ASYNC ACTIONS =====
const API_URL = "/.netlify/functions/fragella";

async function doSearch(q) {
  dropsLoading = true;
  dropsError = null;
  steps = [{label:"Searching retailers",status:"active"}];
  dropsPage = 1;
  hasMore = false;
  lastQuery = q || "__all__";
  render();

  try {
    const action = q && q.trim() ? "search" : "trending";
    const payload = q && q.trim()
      ? { action: "search", query: q, limit: 50 }
      : { action: "trending", limit: 50 };

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const json = await res.json();

    if (json.error) {
      console.error("[SPRITZFIND] API error:", json.error);
      drops = DEFAULT_DROPS;
      dropsError = "Search unavailable. Showing featured fragrances.";
    } else if (json.data && json.data.length > 0) {
      drops = json.data;
      steps = [{label:"Searching retailers",status:"done",count:json.data.length}];
    } else {
      drops = DEFAULT_DROPS;
      dropsError = `No results for "${q}". Showing featured fragrances.`;
    }
  } catch(e) {
    console.error("[SPRITZFIND] Fetch error:", e);
    drops = DEFAULT_DROPS;
    dropsError = "Search unavailable. Showing featured fragrances.";
  }

  dropsLoading = false;
  dropsUpdated = new Date().toLocaleTimeString();
  render();
}

async function doSendChat(text) {
  const t = text || chatInput.trim();
  if (!t || chatThinking) return;
  chatInput = ""; chatShowSug = false;
  chatMsgs = [...chatMsgs, {role:"user",content:t}];
  chatThinking = true;
  render();

  // Placeholder response — connect to your Netlify function / API
  await new Promise(r => setTimeout(r, 800));
  const reply = "I'd be happy to help with that! This chat will be powered by AI once connected to your backend API. For now, try searching for specific fragrances using the search bar above.";
  chatMsgs = [...chatMsgs, {role:"assistant",content:reply}];
  chatThinking = false;
  render();
}

// ===== INIT =====
(function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const searchParam = urlParams.get("search");
  if (searchParam) {
    searchQuery = searchParam;
    render();
    doSearch(searchParam);
    return;
  }
  render();
  doSearch("");
})();
</script>
