</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--border:#e8e2d9;--accent:#5b9bd5;--accent-gold:#b8860b;--text:#1a1a1a;--muted:#8a8078;--green:#2d6a4f;--card:#fff}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.9}}

.nav{border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:stretch;justify-content:space-between;position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);height:64px}
.nav-left{display:flex;align-items:center}
.nav-logo{font-family:'GFS Didot',serif;font-size:1.6rem;font-weight:400;letter-spacing:3px;padding-right:32px;border-right:1px solid var(--border);display:flex;align-items:center;text-decoration:none}
.nav-logo .spritz{color:var(--text)}.nav-logo .find{color:var(--accent)}
.nav-tabs{display:flex;align-items:stretch}
.nav-tab{display:flex;align-items:center;padding:0 22px;font-size:.7rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:all .15s;border-right:1px solid var(--border);border-bottom:2px solid transparent;text-decoration:none}
.nav-tab:hover{color:var(--text);text-decoration:none}
.hamburger{display:none;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--text);padding:8px}

.breadcrumb{padding:16px 40px;font-size:.7rem;color:var(--muted)}
.breadcrumb a{color:var(--muted);text-decoration:none}.breadcrumb a:hover{color:var(--text)}
.breadcrumb .sep{margin:0 8px}

.section-wrap{max-width:1100px;margin:0 auto;padding:0 40px 80px;animation:fadeIn .3s ease}
.brand-header{margin-bottom:32px}
.eyebrow{font-size:.65rem;font-weight:500;letter-spacing:6px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.page-title{font-family:'GFS Didot',serif;font-size:clamp(2.5rem,6vw,4.5rem);line-height:.95;letter-spacing:2px;margin-bottom:8px}
.page-title .gold{color:var(--accent-gold)}
.page-sub{font-size:.85rem;color:var(--muted);line-height:1.7;max-width:540px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:32px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .25s;display:flex;flex-direction:column}
.card:hover{box-shadow:0 6px 30px rgba(0,0,0,.06);transform:translateY(-2px)}
.card-img{width:100%;height:200px;background:#ffffff;display:flex;align-items:center;justify-content:center;font-family:'GFS Didot',serif;font-size:3.5rem;color:#c0cdd8}
.card-body{padding:20px;flex:1;display:flex;flex-direction:column}
.card-brand{font-size:.6rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent-gold);margin-bottom:6px}
.card-name{font-family:'GFS Didot',serif;font-size:1.2rem;line-height:1.2;margin-bottom:6px}
.card-size{font-size:.7rem;color:var(--muted);margin-bottom:8px}
.card-prices{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);margin-top:auto}
.card-retail{font-size:.75rem;color:var(--muted)}
.card-best{font-size:.9rem;font-weight:700;color:var(--green)}
.card-btn{font-family:'Outfit',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--accent-gold);color:var(--accent-gold);padding:6px 14px;border-radius:3px;text-decoration:none;transition:all .15s}
.card-btn:hover{background:var(--accent-gold);color:#fff;text-decoration:none}

.loading{text-align:center;padding:80px;font-size:.8rem;color:var(--muted);animation:shimmer 1.5s infinite}

.site-footer{border-top:1px solid var(--border);padding:24px 40px;display:flex;align-items:center;justify-content:space-between;font-size:.65rem;color:var(--muted);max-width:1200px;margin:0 auto}
.footer-logo{font-family:'GFS Didot',serif;font-size:1.2rem;font-weight:400;letter-spacing:3px}
.footer-logo .spritz{color:var(--text)}.footer-logo .find{color:var(--accent)}

@media(max-width:768px){
  .nav{padding:0 16px}.nav-tabs{display:none}.hamburger{display:block}
  .breadcrumb{padding:12px 16px}
  .section-wrap{padding:0 16px 60px}
  .grid{grid-template-columns:1fr}
  .site-footer{flex-direction:column;gap:8px;text-align:center}
}
</style>
</head>
<body>
<div id="root"></div>
<noscript>
<div style="max-width:700px;margin:80px auto;padding:20px;text-align:center">
  <h1>SpritzFind — Brand Fragrances</h1>
  <p style="color:#8a8078">JavaScript is required to view brand fragrances and compare prices.</p>
  <p><a href="/" style="color:#5b9bd5">Go to SpritzFind homepage</a></p>
</div>
</noscript>
<script>
const pathParts=window.location.pathname.split("/").filter(Boolean);
const brandSlug=pathParts.length>=2?decodeURIComponent(pathParts[1]):null;

function esc(s){if(s==null)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function slugToName(slug){if(!slug)return"";return slug.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase())}
function nameToSlug(name){if(!name)return"";return name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")}

const brandName=slugToName(brandSlug||"");

// Update SEO meta
if(brandName){
  const title=brandName+" Fragrances — Price Comparison | SpritzFind";
  const desc="Compare "+brandName+" fragrance prices across Sephora, Ulta, Amazon, FragranceX and more. Find the best deal on "+brandName+" colognes and perfumes.";
  const url="https://www.spritzfind.com/brand/"+brandSlug;
  document.title=title;
  document.getElementById("meta-desc").content=desc;
  document.getElementById("canonical-link").href=url;
  document.getElementById("og-title").content=title;
  document.getElementById("og-desc").content=desc;
  document.getElementById("og-url").content=url;
  document.getElementById("tw-title").content=title;
  document.getElementById("tw-desc").content=desc;
  const ldEl=document.getElementById("ld-json");
  if(ldEl)ldEl.textContent=JSON.stringify([
    {"@context":"https://schema.org","@type":"CollectionPage","name":brandName+" Fragrances","description":desc,"url":url,"isPartOf":{"@type":"WebApplication","name":"SpritzFind","url":"https://www.spritzfind.com"}},
    {"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[
      {"@type":"ListItem","position":1,"name":"Home","item":"https://www.spritzfind.com"},
      {"@type":"ListItem","position":2,"name":"Brands","item":"https://www.spritzfind.com"},
      {"@type":"ListItem","position":3,"name":brandName,"item":url}
    ]}
  ]);
}

// Render
const root=document.getElementById("root");
root.innerHTML=`
<nav class="nav"><div class="nav-left">
  <a class="nav-logo" href="/" style="text-decoration:none"><span class="spritz">Spritz</span><span class="find">Find</span></a>
  <div class="nav-tabs">
    <a class="nav-tab" href="/">Find Deals</a>
    <a class="nav-tab" href="/releases">New Releases</a>
    <a class="nav-tab" href="/deals">Deals</a>
    <a class="nav-tab" href="/blog">Blog</a>
  </div>
  <button class="hamburger">☰</button>
</div></nav>
<div class="breadcrumb"><a href="/">Home</a><span class="sep">›</span><span>${esc(brandName)} Fragrances</span></div>
<div class="section-wrap">
  <div class="brand-header">
    <div class="eyebrow">Brand</div>
    <div class="page-title"><span class="gold">${esc(brandName)}</span></div>
    <div class="page-sub">Compare prices on all ${esc(brandName)} fragrances across every major retailer.</div>
  </div>
  <div class="loading">Loading ${esc(brandName)} fragrances...</div>
  <div class="grid" id="brand-grid" style="display:none"></div>
</div>
<footer class="site-footer">
  <div class="footer-logo"><span class="spritz">Spritz</span><span class="find">Find</span></div>
  <div>Prices subject to change. Links may be affiliate links.</div>
</footer>`;

// Load brand fragrances from Fragella API
const API_URL="/.netlify/functions/fragella";
(async()=>{
  const loadingEl=document.querySelector(".loading");
  const grid=document.getElementById("brand-grid");
  if(!loadingEl||!grid)return;

  try{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"brand",brand:brandName,limit:30}),
    });
    const json=await res.json();

    if(json.data&&json.data.length>0){
      grid.innerHTML=json.data.map(f=>`
        <div class="card">
          <div class="card-img">${f.image?`<img src="${esc(f.image)}" alt="${esc(f.name)}" style="width:100%;height:100%;object-fit:contain;padding:20px" onerror="this.outerHTML='${esc(brandName[0])}'"/>`:`${esc(brandName[0])}`}</div>
          <div class="card-body">
            <div class="card-brand">${esc(f.brand)}</div>
            <div class="card-name">${esc(f.name)}</div>
            <div class="card-size">${esc(f.size||"")}</div>
            <div class="card-prices">
              <div>${f.retail?`<div class="card-retail">Retail: ${esc(f.retail)}</div>`:""}</div>
              <a class="card-btn" href="/fragrance/${esc(f.slug||nameToSlug(f.name))}">View Prices</a>
            </div>
          </div>
        </div>
      `).join("");
    }else{
      grid.innerHTML=`<div style="text-align:center;padding:60px;color:var(--muted);grid-column:1/-1">No fragrances found for ${esc(brandName)}. <a href="/?search=${encodeURIComponent(brandName)}">Try searching instead</a></div>`;
    }
  }catch(e){
    console.error("[SPRITZFIND] Brand load error:",e);
    grid.innerHTML=`<div style="text-align:center;padding:60px;color:var(--muted);grid-column:1/-1">Failed to load. <a href="/?search=${encodeURIComponent(brandName)}">Try searching instead</a></div>`;
  }

  loadingEl.style.display="none";
  grid.style.display="grid";
})();
</script>
</body>
</html>
